[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (common in FastAPI/LangChain)
    "SIM108", # ternary operator (often less readable)
    "RUF001", # ambiguous unicode character in string (Spanish text)
    "RUF003", # ambiguous unicode character in comment (Spanish text)
    "UP046",  # PEP695 generic class syntax (aggressive refactor)
    "UP047",  # PEP695 generic function syntax (aggressive refactor)
    "E402",   # module-level import not at top (needed for sys.path manipulation)
    "RUF012", # mutable class default (often intentional in Pydantic/LangChain)
]

[tool.ruff.lint.isort]
known-first-party = ["agents", "workflows", "tools", "evaluators", "bot"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
