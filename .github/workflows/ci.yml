name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.10

      - name: Check lint
        run: ruff check engine/ bot/

      - name: Check formatting
        run: ruff format --check engine/ bot/

  engine-unit-test:
    name: Engine — unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install engine with test deps
        run: pip install -e "./engine[test]"

      - name: Run unit tests
        working-directory: engine
        run: python -m pytest tests/ -v --tb=short

  engine-test:
    name: Engine — generate test course
    runs-on: ubuntu-latest
    environment: course-generator-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ./engine
          playwright install chromium

      - name: Run workflow
        working-directory: engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_NAME: ${{ vars.GEMINI_MODEL_NAME }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL_NAME: ${{ vars.MISTRAL_MODEL_NAME }}
          PIXTRAL_MODEL: ${{ vars.PIXTRAL_MODEL }}
          PIXTRAL_API_KEY: ${{ secrets.PIXTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_NAME: ${{ vars.OPENAI_MODEL_NAME }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL_NAME: ${{ vars.GROQ_MODEL_NAME }}
          LANGSMITH_TRACING: ${{ vars.LANGSMITH_TRACING }}
          LANGSMITH_ENDPOINT: ${{ vars.LANGSMITH_ENDPOINT }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: ${{ vars.LANGSMITH_PROJECT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python3 -u -m workflows.workflow --total-pages 1

  bot-test:
    name: Bot — unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bot with test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./bot[test]"

      - name: Run tests
        working-directory: bot
        run: |
          python -m pytest tests/ -v
